providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = [
  "cd cms && python -m venv .venv",
  "cd cms && . .venv/bin/activate && pip install --upgrade pip",
  "cd cms && . .venv/bin/activate && pip install -r requirements.txt"
]

[start]
cmd = "cd cms && bash start.sh"
