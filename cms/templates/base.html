<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Blog CMS{% endblock %}</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --danger: #dc2626;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px 16px 32px;
      }
      .topbar {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .brand {
        font-weight: 700;
        font-size: 16px;
      }
      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .nav a {
        text-decoration: none;
        color: var(--text);
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
      }
      .nav .username { color: var(--muted); margin-left: 4px; }
      .logout-form { display: inline; margin: 0; }
      .logout-btn {
        border: 1px solid #fecaca;
        background: #fff1f2;
        color: var(--danger);
        border-radius: 8px;
        padding: 6px 10px;
        cursor: pointer;
      }
      .content-card {
        margin-top: 16px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
      }
      .msg {
        padding: 10px 12px;
        border-radius: 8px;
        margin: 12px 0;
        border: 1px solid transparent;
      }
      .msg.success { background: #ecfdf3; color: #166534; border-color: #bbf7d0; }
      .msg.error { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
      .msg.warning { background: #fffbeb; color: #92400e; border-color: #fde68a; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border: 1px solid var(--border); padding: 10px; vertical-align: top; }
      th { background: #f9fafb; text-align: left; }
      .right { text-align: right; }
      .actions { display: flex; gap: 8px; align-items: center; justify-content: flex-end; }
      input[type="text"], input[type="number"], input[type="password"], textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 9px 10px;
      }
      label { display: block; font-weight: 600; margin: 12px 0 6px; }
      button, .btn {
        border: 1px solid var(--primary);
        background: var(--primary);
        color: white;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        text-decoration: none;
      }
      button:hover, .btn:hover { background: var(--primary-hover); }
      .btn-secondary {
        background: #fff;
        color: var(--text);
        border-color: var(--border);
      }
      .login-wrap {
        max-width: 460px;
        margin: 48px auto;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px;
      }
      .muted { color: var(--muted); font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="container">
      {% if request.user.is_authenticated %}
        <div class="topbar">
          <div class="brand">Skyinfin CMS</div>
          <div class="nav">
            <a href="/">控制台</a>
            <a href="/posts/new/">新建文章</a>
            <a href="/admin/">Django Admin</a>
            <span class="username">当前用户：{{ request.user.username }}</span>
            <form class="logout-form" method="post" action="/accounts/logout/">
              {% csrf_token %}
              <button class="logout-btn" type="submit">安全退出</button>
            </form>
          </div>
        </div>
      {% endif %}
      {% if messages %}
        {% for message in messages %}
          <div class="msg {% if message.tags %}{{ message.tags }}{% endif %}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <div class="{% if request.user.is_authenticated %}content-card{% endif %}">
        {% block content %}{% endblock %}
      </div>
    </div>
  </body>
</html>
